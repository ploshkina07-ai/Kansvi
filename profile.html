<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій профіль</title>
    <link rel="stylesheet" href="styles/profile.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <nav class="main-nav">
            <div class="logo">
                <a class="logo-link" href="index.html">kansvi</a>
            </div>
            <div class="mobile-quick-actions">
                <a class="mobile-quick-link" href="delivery.html" aria-label="Кошик">
                    <img class="icons" src="photo/free-icon-basket-7087821.png" alt="">
                </a>
            </div>
            <ul class="nav-list">
                <li><a class="nav-link" href="necklaces.html">намиста</a></li>
                <li><a class="nav-link" href="bracelets.html">браслети</a></li>
                <li><a class="nav-link" href="rings.html">каблучки</a></li>
                <li><a class="nav-link" href="about.html">Про нас</a></li>
                <li><a class="nav-icon" href="delivery.html" aria-label="Кошик">
                        <img class="icons" src="photo/free-icon-basket-7087821.png" alt="">
                    </a></li>
                <li><a class="nav-icon" href="profile.html"> <img class="icons"
                            src="photo/free-icon-profile-3106773.png" alt=""></a></li>
            </ul>
        </nav>
    </header>

    <main class="profile-page">
        <div class="container profile-container">
            <div class="profile-grid">
                <aside class="profile-sidebar">
                    <div class="profile-sidebar-title">Мій профіль</div>
                    <nav class="profile-nav">
                        <button type="button" class="profile-nav-item active" data-tab="tab-account">Налаштування акаунту</button>
                        <button type="button" class="profile-nav-item" data-tab="tab-delivery">Дані для доставки</button>
                        <button type="button" class="profile-nav-item" data-tab="tab-payment">Спосіб оплати</button>
                        <button type="button" class="profile-nav-item" data-tab="tab-orders">Мої замовлення</button>
                    </nav>
                </aside>
                <section class="profile-content">
                    <div class="profile-card">
                        <div id="tab-account" class="tab-pane active">
                            <h1>Налаштування акаунту</h1>
                            <form id="profileForm" class="profile-form">
                                <label>
                                    Email
                                    <input id="profileEmail" type="email" disabled>
                                </label>
                                <label>
                                    ПІБ
                                    <input id="profileFullName" type="text" required>
                                </label>
                                <label>
                                    Номер телефону
                                    <input id="profilePhone" type="tel" required>
                                </label>
                                <label>
                                    Дата народження
                                    <input id="profileBirthdate" type="date" required>
                                </label>
                            </form>
                            <div id="profileInfo" class="profile-info"></div>
                            <div id="profileInfoActions" class="profile-info-actions">
                                <button id="logoutBtn" class="button button-outline">Вийти</button>
                            </div>
                        </div>
                        <div id="tab-delivery" class="tab-pane">
                            <h1>Дані для доставки</h1>
                            <form id="deliveryForm" class="profile-form">
                                <label class="full-width">
                                    Адреса доставки
                                    <input id="deliveryAddress" type="text" placeholder="Ваша адреса для доставки">
                                </label>
                                <label class="full-width">
                                    Місто
                                    <input id="deliveryCity" type="text" placeholder="Київ">
                                </label>
                                <label>
                                    Номер будинку
                                    <input id="deliveryHouse" type="text" placeholder="12">
                                </label>
                                <label>
                                    Квартира                                   
                                    <input id="deliveryApartment" type="text" placeholder="34">
                                </label>
                                <label class="full-width">
                                    Коментар до доставки
                                    <input id="deliveryComment" type="text" placeholder="Наприклад, під'їзд, поверх">
                                </label>
                                <button type="submit" class="button">Зберегти дані доставки</button>
                            </form>
                            <div id="deliveryInfo" class="profile-info"></div>
                        </div>
                        <div id="tab-payment" class="tab-pane">
                            <h1>Спосіб оплати</h1>
                            <form id="paymentForm" class="profile-form">
                                <div id="cardDetails" class="payment-details">
                                    <label>
                                        Номер картки
                                        <input id="cardNumber" type="text" placeholder="XXXX XXXX XXXX XXXX">
                                    </label>
                                    <label>
                                        Термін дії
                                        <input id="cardExpiry" type="text" placeholder="MM/YY">
                                    </label>
                                    <label>
                                        CVC
                                        <input id="cardCVC" type="text" placeholder="CVC">
                                    </label>
                                </div>
                                <button type="submit" class="button">Зберегти спосіб оплати</button>
                            </form>
                            <div id="paymentInfo" class="profile-info"></div>
                        </div>
                        <div id="tab-orders" class="tab-pane">
                            <h1>Мої замовлення</h1>
                            <div id="ordersInfo" class="orders-info"></div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>
    
    <footer>
        <div class="footer__container">
            <div class="footer__wrapper">
                <div class="footer__col footer__col--double">
                    <div class="footer__col-wrap">
                        <div class="footer__heading">Kansvi</div>
                        <div class="footer__copyright">
                            <p>© 2026 web.ploshka for Kansvi</p>
                        </div>
                    </div>
                </div>
                <div class="footer__col">
                    <div class="footer__col-wrap">
                        <div class="footer__heading">Instagram</div>
                        <div class="footer__social">
                            <a class="footer__social-icon" href="https://instagram.com/kansvi" target="_blank"
                                rel="noopener noreferrer" title="Instagram">@kansvi</a>
                        </div>
                    </div>
                </div>
                <div class="footer__col">
                    <div class="footer__col-wrap">
                        <div class="footer__heading">Контакти</div>
                        <div class="footer__contacts-group">
                            <div class="footer__contacts-item">
                                <a class="footer__link" href="mailto:kansvi@gmail.com">kansvi@gmail.com</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="scripts/cart.js"></script>
    <script src="script.js"></script>
</body>

</html>
