<!DOCTYPE html>
<html lang="uk">

<head>
       
    <meta charset="UTF-8">
       
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Кошик та Доставка</title>
       
    <link rel="stylesheet" href="styles/delivery.css">
       
    <link        
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@500;700&display=swap"
                rel="stylesheet">
       
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
       
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@700&display=swap" rel="stylesheet">
       
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display&display=swap" rel="stylesheet">
       
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
</head>

<body>
    <header>
    <nav class="main-nav">
      <div class="logo">
                <a class="logo-link" href="index.html">kansvi</a>
            </div>
            <div class="mobile-quick-actions">
                <a class="mobile-quick-link" href="delivery.html" aria-label="Кошик">
                    <img class="icons" src="photo/free-icon-basket-7087821.png" alt="">
                </a>
            </div>
      <ul class="nav-list">
        <li><a class="nav-link" href="necklaces.html">намиста</a></li>
        <li><a class="nav-link" href="bracelets.html">браслети</a></li>
        <li><a class="nav-link" href="rings.html">каблучки</a></li>
        <li><a class="nav-link" href="about.html">Про нас</a></li>
        <li><a class="nav-icon" href="profile.html"> <img class="icons" src="photo/free-icon-profile-3106773.png"
              alt=""></a></li>
      </ul>
    </nav>
  </header>

    <main>
        <section class="delivery-page">
            <div class="container">
                <div class="delivery-top">
                    <div class="cart-container">
                        <div id="cart-items" class="cart-items-list">
                            <p class="empty-cart-message">Завантаження кошика...</p>
                        </div>

                        <div class="cart-summary">
                            <p>Загальна сума: <strong id="cart-total">0.00 UAH</strong></p>
                            <button class="clear-cart-btn" onclick="clearCart(); renderCart();">Очистити кошик</button>
                        </div>
                    </div>
                </div>

                <div class="delivery-bottom">
                    <form id="deliveryForm" class="delivery-form">
                        <div class="delivery-method-block full-width">
                            <label class="delivery-method-label">
                                Спосіб доставки:
                                <select name="method" id="deliveryMethod" required>
                                    <option value="">Оберіть спосіб</option>
                                    <option value="nova">Нова Пошта</option>
                                    <option value="ukr">Укрпошта</option>
                                    <option value="courier">Кур'єр</option>
                                </select>
                            </label>
                        </div>

                        <div id="savedAddressBlock" class="saved-address-block full-width">
                            <p class="saved-address-title">Збережена адреса:</p>
                            <div id="savedAddressContent" class="saved-address-content"></div>
                            <button type="button" id="editSavedAddressBtn" class="button button-outline">Змінити адресу</button>
                        </div>

                        <div id="recipientBlock" class="recipient-block full-width">
                            <button type="button" id="recipientToggleBtn" class="recipient-toggle-btn">
                                <span>Інший отримувач</span>
                                <i class="fas fa-check hidden" aria-hidden="true"></i>
                            </button>
                            <div id="recipientFieldsBlock" class="recipient-fields-block" style="display:none;">
                                <label>
                                    Прізвище отримувача
                                    <input type="text" name="recipientLastName" placeholder="Прізвище отримувача">
                                </label>
                                <label>
                                    Ім'я отримувача
                                    <input type="text" name="recipientFirstName" placeholder="Ім'я отримувача">
                                </label>
                                <label>
                                    Номер телефону отримувача
                                    <input type="tel" name="recipientPhone" placeholder="098 765 4321">
                                </label>
                                <label class="full-width">
                                    Адреса отримувача
                                    <input type="text" name="recipientAddress" placeholder="Вулиця, будинок, квартира">
                                </label>
                                <label class="full-width">
                                    Електронна адреса отримувача
                                    <input type="email" name="recipientEmail" placeholder="example@mail.com">
                                </label>
                            </div>
                        </div>

                        <label id="deliveryLocationLabel" style="display:none;">
                            Відділення / поштомат:
                            <select name="deliveryLocation" id="deliveryLocation" required>
                            </select>
                        </label>

                        <div class="full-width">
                            <span class="payment-title">Спосіб оплати:</span>
                            <div class="radio-group">
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="card" checked>
                                    <div class="option-inner">
                                        <i class="fas fa-credit-card"></i>
                                        <span>Оплата карткою</span>
                                    </div>
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="apple">
                                    <div class="option-inner">
                                        <i class="fab fa-apple"></i>
                                        <span>Apple Pay</span>
                                    </div>
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="google">
                                    <div class="option-inner">
                                        <i class="fab fa-google"></i>
                                        <span>Google Pay</span>
                                    </div>
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="cash">
                                    <div class="option-inner">
                                        <i class="fas fa-money-bill-wave"></i>
                                        <span>Оплата при отриманні</span>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <label class="full-width">
                            Коментар:
                            <textarea name="comment" rows="4" placeholder="Додаткові побажання"></textarea>
                        </label>

                        <button type="submit" class="delivery-btn">Відправити</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

     
    
    <footer>
        <div class="footer__container">
            <div class="footer__wrapper">
                <div class="footer__col footer__col--double">
                    <div class="footer__col-wrap">
                        <div class="footer__heading">Kansvi</div>
                        <div class="footer__copyright">
                            <p>© 2026 web.ploshka for Kansvi</p>
                        </div>
                    </div>
                </div>
                <div class="footer__col">
                    <div class="footer__col-wrap">
                        <div class="footer__heading">Instagram</div>
                        <div class="footer__social">
                            <a class="footer__social-icon" href="https://instagram.com/kansvi" target="_blank"
                                rel="noopener noreferrer" title="Instagram">@kansvi</a>
                        </div>
                    </div>
                </div>
                <div class="footer__col">
                    <div class="footer__col-wrap">
                        <div class="footer__heading">Контакти</div>
                        <div class="footer__contacts-group">
                            <div class="footer__contacts-item">
                                <a class="footer__link" href="mailto:kansvi@gmail.com">kansvi@gmail.com</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="scripts/cart.js"></script>
     
    
    <script src="script.js"></script>
</body>

</html>
